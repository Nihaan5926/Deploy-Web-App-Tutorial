<!DOCTYPE html>
<html lang="en">
<head>
    <title>StatStream | Management</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 8px; margin-right: 10px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Add Statistic</h2>
        <input type="text" id="label" placeholder="Metric Name (e.g. Revenue)">
        <input type="number" id="value" placeholder="Value">
        <button onclick="saveStat()">Save Data</button>
        
        <hr>
        <h2>Stored Data</h2>
        <ul id="statList"></ul>
    </div>

    <script>
        async function fetchStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            const list = document.getElementById('statList');
            list.innerHTML = data.map(s => `<li><strong>${s.label}:</strong> ${s.value} <small>(${s.timestamp})</small></li>`).join('');
        }

        async function saveStat() {
            const label = document.getElementById('label').value;
            const value = document.getElementById('value').value;
            
            await fetch('/api/stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ label, value })
            });
            
            fetchStats(); // Refresh list
        }

        fetchStats(); // Load on start
    </script>
</body>
</html>
