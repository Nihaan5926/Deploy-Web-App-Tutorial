<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --primary: #2563eb; --secondary: #10b981; --text: #1f2937; --border: #e5e7eb; }
        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; margin: 0; color: var(--primary); }
        
        .container { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .container { grid-template-columns: 350px 1fr; } }
        
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card h2 { font-size: 1.1rem; margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        
        /* Form Grid */
        .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .form-full { grid-column: span 2; }
        label { font-size: 0.85rem; font-weight: 600; color: #4b5563; margin-bottom: 4px; display: block; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #f9fafb; transition: 0.2s; }
        input:focus { outline: none; border-color: var(--primary); background: #fff; }
        
        .total-box { background: #eff6ff; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 1.2rem; color: var(--primary); margin-top: 10px; }
        
        button { width: 100%; background: var(--primary); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        button:hover { background: #1d4ed8; }

        /* Charts Layout */
        .charts-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .charts-grid { grid-template-columns: 1fr 1fr; } }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .line-container { height: 350px; grid-column: 1 / -1; }
    </style>
</head>
<body>

<div class="header">
    <h1>Monitoring Dashboard</h1>
    <p>Live Statistics & Data Entry</p>
</div>

<div class="container">
    <div class="card">
        <form id="logForm">
            <h2>SI mi aharu mihaathanah target thah</h2>
            <div class="form-group">
                <div><label>Ssps</label><input type="number" id="ssps" class="g1" value="0" min="0"></div>
                <div><label>SAS</label><input type="number" id="sas" class="g1" value="0" min="0"></div>
                <div><label>Region</label><input type="number" id="g1_region" class="g1" value="0" min="0"></div>
                <div><label>Ses</label><input type="number" id="ses" class="g1" value="0" min="0"></div>
                <div><label>Cis</label><input type="number" id="cis" class="g1" value="0" min="0"></div>
                <div><label>IIU</label><input type="number" id="iiu" class="g1" value="0" min="0"></div>
                <div class="form-full"><label>DAU</label><input type="number" id="dau" class="g1" value="0" min="0"></div>
            </div>
            <div class="total-box">Total: <span id="total1_display">0</span></div>

            <div style="margin: 30px 0;"></div>

            <h2>Inthihaabaa gulhigen monitor kurevunu</h2>
            <div class="form-group">
                <div><label>Region</label><input type="number" id="g2_region" class="g2" value="0" min="0"></div>
                <div><label>Male Area</label><input type="number" id="male_area" class="g2" value="0" min="0"></div>
                <div><label>Si</label><input type="number" id="si" class="g2" value="0" min="0"></div>
                <div><label>CI</label><input type="number" id="ci" class="g2" value="0" min="0"></div>
                <div><label>Ct</label><input type="number" id="ct" class="g2" value="0" min="0"></div>
                <div><label>Cni</label><input type="number" id="cni" class="g2" value="0" min="0"></div>
            </div>
            <div class="total-box" style="color: var(--secondary); background: #ecfdf5;">Total: <span id="total2_display">0</span></div>

            <button type="submit">SAVE LOG ENTRY</button>
        </form>
    </div>

    <div class="charts-grid">
        <div class="card line-container">
            <h2>Totals Over Time</h2>
            <div class="chart-container"><canvas id="lineChart"></canvas></div>
        </div>

        <div class="card">
            <h2>SI Targets Breakdown</h2>
            <div class="chart-container"><canvas id="barChart"></canvas></div>
        </div>

        <div class="card">
            <h2>Election Monitoring</h2>
            <div class="chart-container"><canvas id="doughnutChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    // --- Auto Sum Logic ---
    const calculateTotals = () => {
        let t1 = 0, t2 = 0;
        document.querySelectorAll('.g1').forEach(input => t1 += Number(input.value) || 0);
        document.querySelectorAll('.g2').forEach(input => t2 += Number(input.value) || 0);
        document.getElementById('total1_display').innerText = t1;
        document.getElementById('total2_display').innerText = t2;
        return { t1, t2 };
    };

    // Listen to all inputs to auto-update
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', calculateTotals);
        // Select all text on click for faster mobile entry
        input.addEventListener('focus', function() { this.select(); }); 
    });

    // --- Chart Instances ---
    let charts = {};

    // --- Fetch & Render Data ---
    async function refreshData() {
        const res = await fetch('/api/data');
        const data = await res.json();
        
        const dates = data.logs.map(log => log.date);
        const totals1 = data.logs.map(log => log.total1);
        const totals2 = data.logs.map(log => log.total2);

        // Render Line Chart
        if(charts.line) charts.line.destroy();
        charts.line = new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: {
                labels: dates,
                datasets: [
                    { label: 'SI Targets Total', data: totals1, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', fill: true, tension: 0.4 },
                    { label: 'Election Monitoring Total', data: totals2, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.4 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Render Bar Chart (Group 1)
        if(charts.bar) charts.bar.destroy();
        charts.bar = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: ['Ssps', 'SAS', 'Region', 'Ses', 'Cis', 'IIU', 'DAU'],
                datasets: [{
                    label: 'Total Counts',
                    data: [data.aggregates.g1.ssps, data.aggregates.g1.sas, data.aggregates.g1.region, data.aggregates.g1.ses, data.aggregates.g1.cis, data.aggregates.g1.iiu, data.aggregates.g1.dau],
                    backgroundColor: '#3b82f6', borderRadius: 6
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Render Doughnut Chart (Group 2)
        if(charts.doughnut) charts.doughnut.destroy();
        charts.doughnut = new Chart(document.getElementById('doughnutChart'), {
            type: 'doughnut',
            data: {
                labels: ['Region', 'Male Area', 'Si', 'CI', 'Ct', 'Cni'],
                datasets: [{
                    data: [data.aggregates.g2.region, data.aggregates.g2.male, data.aggregates.g2.si, data.aggregates.g2.ci, data.aggregates.g2.ct, data.aggregates.g2.cni],
                    backgroundColor: ['#10b981', '#34d399', '#059669', '#047857', '#065f46', '#a7f3d0'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, cutout: '65%' }
        });
    }

    // --- Handle Form Submission ---
    document.getElementById('logForm').onsubmit = async (e) => {
        e.preventDefault();
        const totals = calculateTotals();
        
        const payload = {
            ssps: Number(document.getElementById('ssps').value),
            sas: Number(document.getElementById('sas').value),
            g1_region: Number(document.getElementById('g1_region').value),
            ses: Number(document.getElementById('ses').value),
            cis: Number(document.getElementById('cis').value),
            iiu: Number(document.getElementById('iiu').value),
            dau: Number(document.getElementById('dau').value),
            total1: totals.t1,
            
            g2_region: Number(document.getElementById('g2_region').value),
            male_area: Number(document.getElementById('male_area').value),
            si: Number(document.getElementById('si').value),
            ci: Number(document.getElementById('ci').value),
            ct: Number(document.getElementById('ct').value),
            cni: Number(document.getElementById('cni').value),
            total2: totals.t2
        };

        await fetch('/api/logs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        // Reset inputs back to 0
        document.querySelectorAll('input[type="number"]').forEach(input => input.value = "0");
        calculateTotals();
        refreshData();
    };

    // Load data on start
    refreshData();
</script>
</body>
</html>
