<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --text-muted: #94a3b8;
            --primary: #6366f1; --primary-hover: #4f46e5;
            --secondary: #10b981; --accent: #f43f5e; --warning: #f59e0b;
            --border: #334155;
        }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .header h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; color: transparent; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; color: white; }
        .btn-primary { background: var(--primary); } .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--accent); padding: 5px 10px; font-size: 0.8rem; }
        .btn-warning { background: var(--warning); padding: 5px 10px; font-size: 0.8rem; color: #000; }
        
        .container { max-width: 1300px; margin: auto; }
        
        /* Cards */
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid var(--border); margin-bottom: 20px; }
        .card h2 { font-size: 1.2rem; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; color: #e2e8f0; }
        
        /* Form */
        #formWrapper { display: none; }
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0f172a; color: white; outline: none; transition: 0.3s; font-size: 1rem; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        .total-box { background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); padding: 15px; border-radius: 10px; text-align: center; font-size: 1.2rem; font-weight: 700; color: #818cf8; }
        .total-box.g2 { background: rgba(16, 185, 129, 0.1); border-color: var(--secondary); color: #34d399; }
        
        /* Charts Grid */
        .charts-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .charts-grid { grid-template-columns: 1fr 1fr; } }
        .chart-container { position: relative; height: 300px; width: 100%; }
        
        /* Table */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 600px; }
        th { padding: 12px; border-bottom: 2px solid var(--border); color: var(--text-muted); font-size: 0.9rem; }
        td { padding: 15px 12px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        .actions { display: flex; gap: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Monitoring Dashboard</h1>
        <button class="btn btn-primary" onclick="toggleForm()" id="toggleBtn">+ New Entry</button>
    </div>

    <div id="formWrapper" class="card">
        <form id="logForm">
            <h2 style="color: #818cf8;">SI Target Monitoring (Group 1)</h2>
            <div class="form-group">
                <div><label>Ssps</label><input type="number" id="ssps" class="g1" value="0"></div>
                <div><label>SAS</label><input type="number" id="sas" class="g1" value="0"></div>
                <div><label>Region</label><input type="number" id="g1_region" class="g1" value="0"></div>
                <div><label>Ses</label><input type="number" id="ses" class="g1" value="0"></div>
                <div><label>Cis</label><input type="number" id="cis" class="g1" value="0"></div>
                <div><label>IIU</label><input type="number" id="iiu" class="g1" value="0"></div>
                <div><label>DAU</label><input type="number" id="dau" class="g1" value="0"></div>
            </div>
            <div class="total-box">Group 1 Total: <span id="total1_display">0</span></div>

            <h2 style="color: #34d399; margin-top: 30px;">Election Monitoring (Group 2)</h2>
            <div class="form-group">
                <div><label>Region</label><input type="number" id="g2_region" class="g2" value="0"></div>
                <div><label>Male Area</label><input type="number" id="male_area" class="g2" value="0"></div>
                <div><label>Si</label><input type="number" id="si" class="g2" value="0"></div>
                <div><label>CI</label><input type="number" id="ci" class="g2" value="0"></div>
                <div><label>Ct</label><input type="number" id="ct" class="g2" value="0"></div>
                <div><label>Cni</label><input type="number" id="cni" class="g2" value="0"></div>
            </div>
            <div class="total-box g2">Group 2 Total: <span id="total2_display">0</span></div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px; padding: 15px; font-size: 1.1rem;" id="submitBtn">SAVE DATA</button>
        </form>
    </div>

    <div class="charts-grid">
        <div class="card" style="grid-column: 1 / -1;"><div class="chart-container" style="height: 350px;"><canvas id="lineChart"></canvas></div></div>
        <div class="card"><h2>SI Targets Breakdown</h2><div class="chart-container"><canvas id="barChart"></canvas></div></div>
        <div class="card"><h2>Election Monitoring</h2><div class="chart-container"><canvas id="doughnutChart"></canvas></div></div>
    </div>

    <div class="card">
        <h2>Data History & Management</h2>
        <div class="table-responsive">
            <table>
                <thead><tr><th>Date</th><th>Group 1 Total</th><th>Group 2 Total</th><th>Actions</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let charts = {};
    let globalLogs = [];
    let editingId = null;

    // --- UI Logic ---
    function toggleForm() {
        const fw = document.getElementById('formWrapper');
        const btn = document.getElementById('toggleBtn');
        if(fw.style.display === 'block') {
            fw.style.display = 'none';
            btn.innerText = '+ New Entry';
            if(!editingId) resetForm(); 
        } else {
            fw.style.display = 'block';
            btn.innerText = 'Hide Form';
        }
    }

    const calculateTotals = () => {
        let t1 = 0, t2 = 0;
        document.querySelectorAll('.g1').forEach(i => t1 += Number(i.value) || 0);
        document.querySelectorAll('.g2').forEach(i => t2 += Number(i.value) || 0);
        document.getElementById('total1_display').innerText = t1;
        document.getElementById('total2_display').innerText = t2;
        return { t1, t2 };
    };

    document.querySelectorAll('input').forEach(i => {
        i.addEventListener('input', calculateTotals);
        i.addEventListener('focus', function() { this.select(); });
    });

    // --- Data Management ---
    async function refreshData() {
        const res = await fetch('/api/data');
        const data = await res.json();
        globalLogs = data.logs;
        
        // Populate Table
        document.getElementById('historyBody').innerHTML = globalLogs.map(log => `
            <tr>
                <td>${log.date}</td>
                <td style="color: #818cf8; font-weight: bold;">${log.total1}</td>
                <td style="color: #34d399; font-weight: bold;">${log.total2}</td>
                <td class="actions">
                    <button class="btn btn-warning" onclick="editLog(${log.id})">Edit</button>
                    <button class="btn btn-danger" onclick="deleteLog(${log.id})">Delete</button>
                </td>
            </tr>
        `).join('');

        // Reverse dates for line chart (left to right = old to new)
        const chartLogs = [...globalLogs].reverse(); 
        const dates = chartLogs.map(l => l.date);

        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = '#334155';

        if(charts.line) charts.line.destroy();
        charts.line = new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: { labels: dates, datasets: [
                { label: 'Group 1', data: chartLogs.map(l => l.total1), borderColor: '#818cf8', tension: 0.3 },
                { label: 'Group 2', data: chartLogs.map(l => l.total2), borderColor: '#34d399', tension: 0.3 }
            ]},
            options: { responsive: true, maintainAspectRatio: false }
        });

        if(charts.bar) charts.bar.destroy();
        charts.bar = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels: ['Ssps', 'SAS', 'Region', 'Ses', 'Cis', 'IIU', 'DAU'], datasets: [{
                label: 'Totals', data: [data.aggregates.g1.ssps, data.aggregates.g1.sas, data.aggregates.g1.region, data.aggregates.g1.ses, data.aggregates.g1.cis, data.aggregates.g1.iiu, data.aggregates.g1.dau],
                backgroundColor: '#818cf8', borderRadius: 4
            }]},
            options: { responsive: true, maintainAspectRatio: false }
        });

        if(charts.doughnut) charts.doughnut.destroy();
        charts.doughnut = new Chart(document.getElementById('doughnutChart'), {
            type: 'doughnut',
            data: { labels: ['Region', 'Male Area', 'Si', 'CI', 'Ct', 'Cni'], datasets: [{
                data: [data.aggregates.g2.region, data.aggregates.g2.male, data.aggregates.g2.si, data.aggregates.g2.ci, data.aggregates.g2.ct, data.aggregates.g2.cni],
                backgroundColor: ['#10b981', '#34d399', '#059669', '#047857', '#065f46', '#a7f3d0'], borderWidth: 0
            }]},
            options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
        });
    }

    // CRUD Actions
    document.getElementById('logForm').onsubmit = async (e) => {
        e.preventDefault();
        const totals = calculateTotals();
        const payload = {
            ssps: Number(document.getElementById('ssps').value), sas: Number(document.getElementById('sas').value), g1_region: Number(document.getElementById('g1_region').value), ses: Number(document.getElementById('ses').value), cis: Number(document.getElementById('cis').value), iiu: Number(document.getElementById('iiu').value), dau: Number(document.getElementById('dau').value), total1: totals.t1,
            g2_region: Number(document.getElementById('g2_region').value), male_area: Number(document.getElementById('male_area').value), si: Number(document.getElementById('si').value), ci: Number(document.getElementById('ci').value), ct: Number(document.getElementById('ct').value), cni: Number(document.getElementById('cni').value), total2: totals.t2
        };

        const method = editingId ? 'PUT' : 'POST';
        const url = editingId ? `/api/logs/${editingId}` : '/api/logs';

        await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        
        resetForm();
        refreshData();
    };

    function editLog(id) {
        const log = globalLogs.find(l => l.id === id);
        if(!log) return;
        
        editingId = id;
        document.getElementById('formWrapper').style.display = 'block';
        document.getElementById('toggleBtn').innerText = 'Hide Form';
        document.getElementById('submitBtn').innerText = 'UPDATE DATA';
        document.getElementById('submitBtn').style.background = 'var(--warning)';
        document.getElementById('submitBtn').style.color = '#000';

        ['ssps','sas','g1_region','ses','cis','iiu','dau','g2_region','male_area','si','ci','ct','cni'].forEach(key => {
            document.getElementById(key).value = log[key];
        });
        calculateTotals();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteLog(id) {
        if(confirm("Are you sure you want to delete this entry?")) {
            await fetch(`/api/logs/${id}`, { method: 'DELETE' });
            refreshData();
        }
    }

    function resetForm() {
        editingId = null;
        document.querySelectorAll('input[type="number"]').forEach(i => i.value = "0");
        document.getElementById('submitBtn').innerText = 'SAVE DATA';
        document.getElementById('submitBtn').style.background = 'var(--primary)';
        document.getElementById('submitBtn').style.color = '#fff';
        calculateTotals();
    }

    refreshData();
</script>
</body>
</html>
